<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor | Among Us Private Server</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
          integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
          crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light d-flex flex-column justify-content-center align-items-center vh-100 p-0 m-0">

<div class="container d-flex flex-column justify-content-center align-items-center" style="max-width: 600px;">

    <header class="text-center mb-5">
        <h1 class="display-3 font-weight-bold mb-1" style="letter-spacing: 2px;">IMPOSTOR</h1>
        
        <p class="h5 font-weight-normal mb-3 text-light">
            Among Us Private Server <span class="text-white-50">| 2020.11.17/2020.12.9</span>
        </p>

        <div class="small text-white-50 px-4" style="line-height: 1.5; opacity: 0.8;">
            <p class="mb-1">Modified by <strong>GiantPreston</strong> for old Among Us region files with custom names.</p>
            <p class="mb-3">Based off of the original Impostor site.</p>
            <p class="text-warning font-weight-bold" style="font-size: 0.85rem;">
                Use Impostor v1.2.2 or earlier for this site to work.
            </p>
        </div>
    </header>

    <section class="w-100">
        <form id="serverFileForm" class="mx-auto" style="max-width: 400px;">

            <div class="form-group mb-3">
                <input
                    class="form-control form-control-lg bg-transparent text-light text-center border-secondary"
                    style="border-radius: 10px;"
                    type="text"
                    id="regionName"
                    name="regionName"
                    placeholder="Region Name"
                    value="Impostor"
                    required>
            </div>

            <div class="form-row mb-4">
                <div class="col-8">
                    <input class="form-control form-control-lg bg-transparent text-light text-center border-secondary"
                           style="border-radius: 10px;"
                           type="text"
                           placeholder="Server IP"
                           id="ip"
                           name="ip"
                           required
                           pattern="^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
                </div>
                <div class="col-4">
                    <input class="form-control form-control-lg bg-transparent text-light text-center border-secondary"
                           style="border-radius: 10px;"
                           type="number"
                           placeholder="Port"
                           id="port"
                           name="port"
                           value="22023"
                           min="1"
                           max="65535"
                           required>
                </div>
            </div>

            <div class="text-center">
                <button class="btn btn-primary btn-lg btn-block shadow-sm py-3" 
                        style="border-radius: 10px; font-weight: 600; letter-spacing: 0.5px;">
                    Download Server File
                </button>
            </div>

        </form>
    </section>

    <footer class="mt-5 text-center w-100">
        <p class="small text-white-50">
            To create a server, see the instructions in 
            <a href="https://github.com/Impostor/Impostor/tree/v1.2.2" class="text-info text-decoration-none">GitHub</a>.
        </p>
    </footer>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script src="script.js"></script>

</body>
</html>
